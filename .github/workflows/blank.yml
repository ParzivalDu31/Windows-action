name: Build EXE

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install deps
      run: |
        pip install --upgrade pip
        pip install pyinstaller

    - name: Build EXE
      run: pyinstaller --onefile BLOCK.py

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: exe
        path: dist/
