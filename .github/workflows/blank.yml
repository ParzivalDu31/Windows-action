name: Build EXE

on: [push]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: pip install -r requirements.txt

    - name: Build exe
      run: pyinstaller --onefile main.py

    - name: Upload exe
      uses: actions/upload-artifact@v4
      with:
        name: exe
        path: dist/
